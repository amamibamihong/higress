# LLM Guard Wasm 插件示例配置

serviceName: llm-guard.dns
servicePort: 8000
serviceHost: llm-guard.example.com

# 如果使用 IP 地址（固定地址类型服务），请使用以下配置：
# serviceName: llm-guard.static
# servicePort: 80
# serviceHost: 192.168.1.100

# 默认操作：MASK（替换）、BLOCK（阻断）
# 只要任何一个被触发的扫描项标记为 BLOCK，则执行阻断；否则如果有项标记为 MASK，则执行内容替换。
defaultAction: MASK

# 阻断响应配置
denyCode: 200
denyMessage: "内容包含风险，已被拦截"

# 超时设置（毫秒）
timeout: 5000

# LLM Guard 端点配置（可选，使用默认值）
endpointAnalyzePrompt: "/analyze/prompt"

# 内容提取路径配置（可选，使用默认值）
requestJsonPath: "messages.@reverse.0.content"
responseJsonPath: "choices.0.message.content"

# Scanners 配置
# 每个 scanner 可以单独配置 action。
# 对于 Anonymize scanner，还可以进一步配置 entities 的 action。
scanners:
  - name: SensitiveWords
    action: BLOCK
  - name: Anonymize
    action: MASK
    entities:
      - entityType: PHONE_NUMBER_ZH
        action: BLOCK
      - entityType: EMAIL_ADDRESS
        action: MASK
      - entityType: ID_CARD_ZH
        action: BLOCK
      - entityType: BANK_CARD_ZH
        action: BLOCK
      - entityType: PASSPORT_ZH
        action: BLOCK
      - entityType: LOCATION
        action: MASK
      - entityType: PERSON
        action: MASK
      - entityType: ORGANIZATION
        action: MASK
      - entityType: IP_ADDRESS
        action: MASK
